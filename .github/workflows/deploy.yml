name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend build into backend
        run: |
          mkdir -p backend/static
          cp -r frontend/dist/. backend/static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Zip backend
        run: |
          cd backend
          zip -r ../backend.zip .

      - name: Deploy via zip deploy
        env:
          APP_NAME: ${{ secrets.BACKEND_APP_NAME }}
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          echo "$PUBLISH_PROFILE" > profile.xml
          USERNAME=$(grep -oP 'publishMethod="ZipDeploy".*?userName="\K[^"]+' profile.xml)
          PASSWORD=$(grep -oP 'publishMethod="ZipDeploy".*?userPWD="\K[^"]+' profile.xml)
          curl -X POST \
            "https://${APP_NAME}.scm.azurewebsites.net/api/zipdeploy" \
            --user "${USERNAME}:${PASSWORD}" \
            -H "Content-Type: application/zip" \
            --data-binary @backend.zip \
            --fail \
            --show-error