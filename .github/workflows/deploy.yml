name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.BACKEND_URL }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_SKY_07AF93203 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Zip backend
        run: |
          cd backend
          zip -r ../backend.zip .

      - name: Deploy via zip deploy
        env:
          APP_NAME: ${{ secrets.BACKEND_APP_NAME }}
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          echo "$PUBLISH_PROFILE" > profile.xml
          USERNAME=$(grep -oP 'publishMethod="ZipDeploy".*?userName="\K[^"]+' profile.xml)
          PASSWORD=$(grep -oP 'publishMethod="ZipDeploy".*?userPWD="\K[^"]+' profile.xml)
          echo "Username found: ${USERNAME:0:5}..."
          curl -X POST \
            "https://${APP_NAME}.scm.azurewebsites.net/api/zipdeploy" \
            --user "${USERNAME}:${PASSWORD}" \
            -H "Content-Type: application/zip" \
            --data-binary @backend.zip \
            --fail \
            --show-error